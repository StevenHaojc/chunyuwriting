          E("p",{style:{textAlign:"center",fontSize:12,color:c,fontWeight:700,margin:0}},"🔑 逻辑线索："+chain.flow),
          E("p",{style:{textAlign:"center",fontSize:11,color:"var(--t2)",margin:"4px 0 0"}},"当前「"+step.role+"」"+(stepIdx>0?"，上一步「"+chain.steps[stepIdx-1].role+"」= "+chain.steps[stepIdx-1].cn:""))):null,
        phase===2?E("div",{style:{marginTop:12,padding:14,borderRadius:12,background:c+"10",border:"2px solid "+c+"22"}},
          E("p",{style:{textAlign:"center",fontSize:16,fontWeight:700,color:"var(--t1)",lineHeight:1.6,margin:0}},step.en)):null),
      E("div",{style:{marginTop:14}},
        phase<2?E("button",{onClick:function(){setPhase(phase+1)},style:{width:"100%",background:c,color:"#fff",border:"none",borderRadius:12,padding:12,fontSize:14,fontWeight:700,cursor:"pointer"}},phase===0?"💡 查看逻辑线索":"👀 揭晓英文"):
        E("div",{style:{display:"flex",gap:10}},
          E("button",{onClick:function(){handleAnswer(false)},style:{flex:1,background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:12,padding:12,fontSize:13,fontWeight:700,cursor:"pointer"}},"😅 没想起来"),
          E("button",{onClick:function(){handleAnswer(true)},style:{flex:1,background:"#dcfce7",color:"#16a34a",border:"none",borderRadius:12,padding:12,fontSize:13,fontWeight:700,cursor:"pointer"}},"✅ 记住了")))
    )
  );
}

function ReplaceMode(p){
  var c=p.topic.color,items=p.data.replacements;
  var is=useState(0),idx=is[0],setIdx=is[1];
  var rs=useState(false),rev=rs[0],setRev=rs[1];
  return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
    E("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      E("button",{onClick:p.onBack,style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--t2)"}},"←"),
      E("span",{style:{fontSize:20}},p.topic.emoji),E("span",{style:{fontWeight:700,fontSize:15,color:"var(--t1)"}},"🔄 替换词"),
      E("span",{style:{marginLeft:"auto",fontSize:12,color:"var(--t2)",fontWeight:600}},(idx+1)+"/"+items.length)),
    E("div",{style:{background:"var(--card)",borderRadius:18,padding:28,textAlign:"center"}},
      E("p",{style:{fontSize:11,color:"var(--t2)",margin:"0 0 6px",fontWeight:600}},"5.5 分"),
      E("p",{style:{fontSize:26,fontWeight:800,color:"#bbb",margin:"0 0 20px",textDecoration:"line-through",textDecorationColor:"#e74c3c55"}},items[idx].basic),
      E("div",{style:{width:36,height:2,background:c,margin:"0 auto 20px",borderRadius:2}}),
      E("p",{style:{fontSize:11,color:"var(--t2)",margin:"0 0 6px",fontWeight:600}},"7 分 ⬇️"),
      E("div",{onClick:function(){if(!rev)setRev(true)},style:{minHeight:44,display:"flex",alignItems:"center",justifyContent:"center",background:rev?c+"10":"var(--border)",borderRadius:12,padding:"10px 16px",cursor:rev?"default":"pointer",transition:"all .3s"}},
        rev?E("p",{style:{fontSize:20,fontWeight:800,color:c,margin:0}},items[idx].advanced):E("p",{style:{fontSize:13,color:"var(--t2)",margin:0}},"点击揭晓 ✨"))),
    E("div",{style:{display:"flex",justifyContent:"space-between",marginTop:18}},
      E("button",{disabled:idx===0,onClick:function(){setIdx(idx-1);setRev(false)},style:{background:idx===0?"var(--card)":c,color:idx===0?"var(--t2)":"#fff",border:"none",borderRadius:10,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:idx===0?"default":"pointer",opacity:idx===0?.3:1}},"← 上一个"),
      E("button",{disabled:idx===items.length-1,onClick:function(){setIdx(idx+1);setRev(false)},style:{background:idx===items.length-1?"var(--card)":c,color:idx===items.length-1?"var(--t2)":"#fff",border:"none",borderRadius:10,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:idx===items.length-1?"default":"pointer",opacity:idx===items.length-1?.3:1}},"下一个 →"))
  );
}

function SentencesMode(p){
  var c=p.topic.color,items=p.data.sentences;
  var is=useState(0),idx=is[0],setIdx=is[1];
  var ss=useState(false),show=ss[0],setShow=ss[1];
  return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
    E("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      E("button",{onClick:p.onBack,style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--t2)"}},"←"),
      E("span",{style:{fontSize:20}},p.topic.emoji),E("span",{style:{fontWeight:700,fontSize:15,color:"var(--t1)"}},"💎 观点句"),
      E("span",{style:{marginLeft:"auto",fontSize:12,color:"var(--t2)",fontWeight:600}},(idx+1)+"/"+items.length)),
    E("div",{style:{background:"var(--card)",borderRadius:18,padding:24,minHeight:200,display:"flex",flexDirection:"column",justifyContent:"center"}},
      E("p",{style:{fontSize:18,fontWeight:800,color:"var(--t1)",lineHeight:1.7,textAlign:"center",margin:"0 0 16px"}},items[idx].cn),
      show?E("div",{style:{background:c+"10",borderRadius:12,padding:"14px 16px",border:"1.5px solid "+c+"25"}},
        E("p",{style:{fontSize:14,fontWeight:600,color:"var(--t1)",lineHeight:1.6,textAlign:"center",margin:0}},items[idx].en)):
      E("button",{onClick:function(){setShow(true)},style:{width:"100%",background:c,color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:14,fontWeight:700,cursor:"pointer"}},"👀 查看英文")),
    E("div",{style:{display:"flex",justifyContent:"space-between",marginTop:18}},
      E("button",{disabled:idx===0,onClick:function(){setIdx(idx-1);setShow(false)},style:{background:idx===0?"var(--card)":c,color:idx===0?"var(--t2)":"#fff",border:"none",borderRadius:10,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:idx===0?"default":"pointer",opacity:idx===0?.3:1}},"← 上一句"),
      E("button",{disabled:idx===items.length-1,onClick:function(){setIdx(idx+1);setShow(false)},style:{background:idx===items.length-1?"var(--card)":c,color:idx===items.length-1?"var(--t2)":"#fff",border:"none",borderRadius:10,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:idx===items.length-1?"default":"pointer",opacity:idx===items.length-1?.3:1}},"下一句 →"))
  );
}

function App(){
  var ts=useState(null),topic=ts[0],setTopic=ts[1];
  var ms=useState(null),mode=ms[0],setMode=ms[1];
  if(!topic)return E(TopicSelector,{onSelect:setTopic});
  if(!mode)return E(ModeSelector,{topic:topic,onSelect:setMode,onBack:function(){setTopic(null)}});
  var d=DATA[topic.id],back=function(){setMode(null)};
  if(mode==="study")return E(StudyMode,{topic:topic,data:d,onBack:back});
  if(mode==="test")return E(TestMode,{topic:topic,data:d,onBack:back});
  if(mode==="replace")return E(ReplaceMode,{topic:topic,data:d,onBack:back});
  if(mode==="sentences")return E(SentencesMode,{topic:topic,data:d,onBack:back});
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(E(App));
</script>
</body>
</html>
