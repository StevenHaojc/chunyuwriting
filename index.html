 evidence strongly supports this view."}]},{"title":"因果关系","desc":"用于表达原因和结果","items":[{"en":"As a result / Consequently / Therefore","cn":"因此 / 结果","eg":"As a result, many young people are unable to find stable employment."},{"en":"This leads to / This results in","cn":"这导致了","eg":"This leads to a decline in the quality of public services."},{"en":"Due to / Owing to / Because of","cn":"由于","eg":"Due to the lack of funding, many schools cannot afford modern equipment."},{"en":"For this reason","cn":"因此 / 出于这个原因","eg":"For this reason, governments should increase spending on healthcare."},{"en":"... which in turn ...","cn":"……进而……","eg":"This improves productivity, which in turn boosts economic growth."}]},{"title":"举例说明","desc":"用于用具体例子支撑观点","items":[{"en":"For example / For instance","cn":"例如","eg":"For example, countries like Sweden have achieved high levels of gender equality."},{"en":"A good example of this is","cn":"一个好的例子是","eg":"A good example of this is the congestion charge in London."},{"en":"This is illustrated by the fact that","cn":"这一点可以从……得到说明","eg":"This is illustrated by the fact that crime rates have dropped significantly."},{"en":"To take ... as an example","cn":"以……为例","eg":"To take Japan as an example, its aging population has created significant economic challenges."}]},{"title":"总结收尾","desc":"用于文章结尾总结观点","items":[{"en":"In conclusion / To conclude","cn":"总之 / 总而言之","eg":"In conclusion, a balanced approach is needed to address this complex issue."},{"en":"To sum up / All things considered","cn":"综上所述 / 综合考虑","eg":"All things considered, the advantages clearly outweigh the disadvantages."},{"en":"On balance","cn":"总的来说","eg":"On balance, I believe that the benefits of globalization outweigh its drawbacks."},{"en":"Taking everything into account","cn":"综合各方面考虑","eg":"Taking everything into account, governments and individuals both have a role to play."}]},{"title":"对比比较","desc":"用于比较两个事物或观点","items":[{"en":"In contrast / By contrast","cn":"相比之下", function ConnectorsMode(p){
  var ms=useState("browse"),mode=ms[0],setMode=ms[1];
  var ss=useState(0),si=ss[0],setSi=ss[1];
  var ts=useState(0),ti=ts[0],setTi=ts[1];
  var rs=useState(false),revealed=rs[0],setRevealed=rs[1];
  var cs=useState(null),chosen=cs[0],setChosen=cs[1];
  var scs=useState({right:0,wrong:0}),score=scs[0],setScore=scs[1];
  var ds=useState(false),done=ds[0],setDone=ds[1];
  var os=useState(null),order=os[0],setOrder=os[1];
  var sections=CONNECTORS.sections;
  var sec=sections[si];
  var pc="#8e44ad";

  function startTest(){
    var arr=[];for(var i=0;i<CONN_EXERCISES.length;i++)arr.push(i);
    for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
    setOrder(arr);setTi(0);setRevealed(false);setChosen(null);setScore({right:0,wrong:0});setDone(false);setMode("test");
  }

  // Header with mode toggle
  var header=E("div",null,
    E("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
      E("button",{onClick:p.onBack,style:{background:"none",border:"none",fontSize:23,cursor:"pointer",color:"var(--t2)"}},"←"),
      E("span",{style:{fontSize:23}},"🔗"),
      E("span",{style:{fontWeight:700,fontSize:18,color:"var(--t1)"}},"衔接词库")),
    E("div",{style:{display:"flex",gap:8,marginBottom:16}},
      E("button",{onClick:function(){setMode("browse")},style:{flex:1,background:mode==="browse"?pc:"var(--card)",color:mode==="browse"?"#fff":"var(--t2)",border:"none",borderRadius:12,padding:"8px",fontSize:15,fontWeight:700,cursor:"pointer"}},"📖 查看"),
      E("button",{onClick:startTest,style:{flex:1,background:mode==="test"?pc:"var(--card)",color:mode==="test"?"#fff":"var(--t2)",border:"none",borderRadius:12,padding:"8px",fontSize:15,fontWeight:700,cursor:"pointer"}},"🧠 填空测试"))
  );

  // Browse mode
  if(mode==="browse"){
    return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
      header,
      E("div",{style:{display:"flex",gap:5,marginBottom:16,flexWrap:"wrap",overflowX:"auto"}},
        sections.map(function(s,i){return E("button",{key:i,onClick:function(){setSi(i)},style:{background:si===i?pc:"var(--card)",color:si===i?"#fff":"var(--t2)",border:"none",borderRadius:16,padding:"4px 11px",fontSize:14,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}},s.title)})),
      E("div",{style:{background:"var(--card)",borderRadius:16,padding:20}},
        E("div",{style:{fontSize:17,fontWeight:800,color:pc,marginBottom:4}},sec.title),
        E("div",{style:{fontSize:14,color:"var(--t2)",marginBottom:14}},sec.desc),
        sec.items.map(function(item,i){return E("div",{key:i,style:{padding:"12px 0",borderBottom:i<sec.items.length-1?"1px solid var(--border)":"none"}},
          E("div",{style:{fontSize:17,fontWeight:700,color:"var(--t1)",marginBottom:3}},item.en),
          E("div",{style:{fontSize:15,color:"var(--t2)",marginBottom:6}},item.cn),
          E("div",{style:{fontSize:14,color:pc,fontStyle:"italic",background:pc+"08",borderRadius:8,padding:"6px 10px"}},item.eg)
        )}))
    );
  }

  // Test mode - done screen
  if(done){
    var total=score.right+score.wrong;
    var pct=total>0?Math.round(score.right/total*100):0;
    return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
      header,
      E("div",{style:{textAlign:"center",padding:"40px 20px"}},
        E("div",{style:{fontSize:58,marginBottom:12}},pct>=80?"🎉":pct>=50?"💪":"📚"),
        E("p",{style:{fontSize:25,fontWeight:800,color:"var(--t1)",margin:"0 0 4px"}},"测试完成！"),
        E("p",{style:{fontSize:46,fontWeight:900,color:pc,margin:"8px 0"}},pct+"%"),
        E("p",{style:{color:"var(--t2)",fontSize:16}},"正确 "+score.right+" · 错误 "+score.wrong),
        E("button",{onClick:startTest,style:{background:pc,color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:20}},"再来一轮"))
    );
  }

  // Test mode - exercise
  if(!order||ti>=order.length){startTest();return null;}
  var ex=CONN_EXERCISES[order[ti]];
  var progress=(ti/order.length)*100;

  function handleChoice(opt){
    if(chosen!==null)return;
    setChosen(opt);setRevealed(true);
    if(opt===ex.answer){setScore(function(s){return{right:s.right+1,wrong:s.wrong}})}
    else{setScore(function(s){return{right:s.right,wrong:s.wrong+1}})}
  }
  function nextQ(){
    if(ti+1>=order.length){setDone(true)}
    else{setTi(ti+1);setRevealed(false);setChosen(null)}
  }

  return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
    header,
    E("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
      E("span",{style:{fontSize:13,color:"var(--t2)",fontWeight:600}},(ti+1)+"/"+order.length),
      E("span",{style:{fontSize:13,color:pc,background:pc+"12",borderRadius:6,padding:"2px 8px",fontWeight:700}},ex.cat)),
    E("div",{style:{height:4,background:"var(--border)",borderRadius:4,marginBottom:16,overflow:"hidden"}},
      E("div",{style:{height:"100%",width:progress+"%",background:pc,borderRadius:4,transition:"width .4s"}})),

    E("div",{style:{background:"var(--card)",borderRadius:18,padding:22,border:"2px solid "+pc+"15",marginBottom:16}},
      E("div",{style:{fontSize:16,color:"var(--t1)",lineHeight:2,fontWeight:500}},
        E("span",null,ex.before+" "),
        E("span",{style:{display:"inline-block",minWidth:revealed?0:100,padding:revealed?"0":"2px 0",borderBottom:revealed?"none":"3px solid "+pc,color:revealed?(chosen===ex.answer?"#27ae60":"#e74c3c"):pc,fontWeight:800,fontSize:17,transition:"all .3s"}},
          revealed?ex.answer:"______"),
        E("span",null," "+ex.after))),

    !revealed?E("div",null,
      E("p",{style:{fontSize:14,color:"var(--t2)",textAlign:"center",marginBottom:12}},"选择正确的衔接词："),
      E("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        ex.opts.map(function(opt,oi){return E("button",{key:oi,onClick:function(){handleChoice(opt)},style:{background:"var(--card)",color:"var(--t1)",border:"2px solid "+pc+"25",borderRadius:14,padding:"14px 10px",fontSize:15,fontWeight:700,cursor:"pointer",transition:"all .2s",textAlign:"center"}},opt)}))):null,

    revealed?E("div",null,
      chosen===ex.answer?
        E("div",{style:{background:"#27ae6010",borderRadius:14,padding:16,border:"1.5px solid #27ae6025",marginBottom:14,textAlign:"center"}},
          E("span",{style:{fontSize:28}},"✅"),
          E("p",{style:{fontSize:16,fontWeight:700,color:"#27ae60",margin:"4px 0 0"}},"正确！")):
        E("div",{style:{background:"#e74c3c10",borderRadius:14,padding:16,border:"1.5px solid #e74c3c25",marginBottom:14}},
          E("div",{style:{textAlign:"center"}},
            E("span",{style:{fontSize:28}},"❌"),
            E("p",{style:{fontSize:16,fontWeight:700,color:"#e74c3c",margin:"4px 0 0"}},"正确答案是："+ex.answer)),
          E("p",{style:{fontSize:14,color:"var(--t2)",margin:"8px 0 0",textAlign:"center"}},"你选了："+chosen)),
      E("button",{onClick:nextQ,style:{width:"100%",background:pc,color:"#fff",border:"none",borderRadius:14,padding:14,fontSize:16,fontWeight:700,cursor:"pointer",marginTop:8}},ti+1>=order.length?"查看成绩 🎯":"下一题 →")):null
  );
}

        E("p",{style:{fontSize:17,fontWeight:700,color:"var(--t1)",margin:"0 0 8px",textAlign:"center"}},"\u{1F914} 先自己想 2 分钟"),
        E("div",{style:{fontSize:15,color:"var(--t2)",lineHeight:1.8,marginBottom:14}},
          E("div",null,"1\uFE0F\u20E3 这道题的关键词是什么？具体在问什么？"),
          E("div",null,"2\uFE0F\u20E3 应该用哪个总逻辑公式？"),
          E("div",null,"3\uFE0F\u20E3 主体段分别写什么？能用哪条逻辑链？"),
          E("div",null,"4\uFE0F\u20E3 有没有学过的观点句可以直接迁移？")),
        E("button",{onClick:function(){setStep(1);doAnalysis(exam)},style:{width:"100%",background:"linear-gradient(135deg,"+c+","+c+"cc)",color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:18,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px "+c+"33"}},"我想好了，查看详细解析")):null,

      step===1&&analysis?E("div",null,
        E("div",{style:{background:"#d4a01708",borderRadius:14,padding:16,border:"1.5px solid #d4a01720",marginBottom:12}},
          E("div",{style:{fontSize:16,fontWeight:800,color:"#d4a017",marginBottom:8}},"\u{1F50D} 审题分析"),
          E("p",{style:{fontSize:16,color:"var(--t1)",lineHeight:1.7,margin:0}},analysis.questionAnalysis)),

        analysis.warning?E("div",{style:{background:"#e74c3c08",borderRadius:12,padding:12,border:"1.5px solid #e74c3c20",marginBottom:12}},
          E("div",{style:{fontSize:15,fontWeight:800,color:"#e74c3c",marginBottom:4}},"\u26A0\uFE0F 易踩坑提醒"),
          E("p",{style:{fontSize:15,color:"var(--t1)",lineHeight:1.6,margin:0}},analysis.warning)):null,

        analysis.structure?E("div",{style:{background:"var(--card)",borderRadius:14,padding:16,border:"2px solid "+c+"15",marginBottom:12}},
          E("div",{style:{fontSize:16,fontWeight:800,color:"#8e44ad",marginBottom:10}},"\u{1F4DD} 针对本题的写作结构"),
          [["开头",analysis.structure.intro],["主体1",analysis.structure.body1],["主体2",analysis.structure.body2],["结尾",analysis.structure.conclusion]].map(function(item,i){
            var roleColors={"开头":c,"主体1":"#27ae60","主体2":"#e67e22","结尾":"#8e44ad"};
            return item[1]?E("div",{key:i,style:{marginBottom:10}},
              E("span",{style:{fontSize:13,fontWeight:800,color:"#fff",background:roleColors[item[0]]||c,borderRadius:5,padding:"2px 8px",marginRight:6}},item[0]),
              E("p",{style:{fontSize:15,color:"var(--t1)",lineHeight:1.7,margin:"4px 0 0",paddingLeft:2}},item[1])):null})):null,

        analysis.chainMapping&&analysis.chainMapping.length>0?E("div",{style:{background:c+"06",borderRadius:14,padding:16,border:"1.5px solid "+c+"12",marginBottom:12}},
          E("div",{style:{fontSize:16,fontWeight:800,color:c,marginBottom:10}},"\u{1F517} 逻辑链迁移指南"),
          analysis.chainMapping.map(function(cm,i){return E("div",{key:i,style:{background:"var(--card)",borderRadius:10,padding:12,marginBottom:8,border:"1px solid "+c+"10"}},
            E("div",{style:{fontSize:15,fontWeight:700,color:c,marginBottom:4}},"\u{1F4CC} "+cm.chain),
            E("div",{style:{fontSize:14,color:"var(--t2)",marginBottom:4}},"\u{1F4A1} 选用理由："+cm.why),
            E("div",{style:{fontSize:14,color:"var(--t1)",lineHeight:1.6,background:c+"06",borderRadius:8,padding:"8px 10px"}},"\u{1F527} 迁移方法："+cm.howToAdapt))})):null,

        analysis.usableSentences&&analysis.usableSentences.length>0?E("div",{style:{background:"#27ae6008",borderRadius:14,padding:16,border:"1.5px solid #27ae6020",marginBottom:12}},
          E("div",{style:{fontSize:16,fontWeight:800,color:"#27ae60",marginBottom:10}},"\u{1F48E} 可复用的高分表达"),
          analysis.usableSentences.map(function(s,i){return E("div",{key:i,style:{fontSize:15,color:"var(--t1)",lineHeight:1.6,padding:"6px 0",borderBottom:i<analysis.usableSentences.length-1?"1px solid var(--border)":"none"}},"\u2022 "+s)})):null,

        E("div",{style:{display:"flex",gap:10,marginTop:16}},
          E("button",{onClick:function(){if(selIdx+1<filtered.length){setSelIdx(selIdx+1);setStep(0);setAnalysis(null)}else{setSelIdx(null);setStep(0);setAnalysis(null)}},style:{flex:1,background:c,color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:17,fontWeight:700,cursor:"pointer"}},selIdx+1<filtered.length?"下一题 \u2192":"\u{1F519} 返回列表"),
          E("button",{onClick:function(){setStep(0);setAnalysis(null)},style:{flex:1,background:"var(--card)",color:"var(--t1)",border:"2px solid var(--border)",borderRadius:12,padding:13,fontSize:17,fontWeight:700,cursor:"pointer"}},"\u{1F504} 重做本题"))
      ):null
    );
  }

  // List view
  return E("div",{style:{minHeight:"100vh",padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
    E("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
      E("button",{onClick:p.onBack,style:{background:"none",border:"none",fontSize:23,cursor:"pointer",color:"var(--t2)"}},"←"),
      E("span",{style:{fontSize:23}},"📝"),
      E("span",{style:{fontWeight:700,fontSize:18,color:"var(--t1)"}},"真题试炼"),
      E("span",{style:{marginLeft:"auto",fontSize:15,color:"var(--t2)",fontWeight:600}},filtered.length+"题")),
    E("div",{style:{marginBottom:10}},
      E("div",{style:{fontSize:14,fontWeight:700,color:"var(--t2)",marginBottom:4}},"按年份"),
      E("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        years.map(function(y){return E("button",{key:y,onClick:function(){setFilterYear(y)},style:{background:filterYear===y?"#8e44ad":"var(--card)",color:filterYear===y?"#fff":"var(--t2)",border:"none",borderRadius:12,padding:"3px 9px",fontSize:13,fontWeight:700,cursor:"pointer"}},y==="all"?"全部":y)}))),
    E("div",{style:{marginBottom:14}},
      E("div",{style:{fontSize:14,fontWeight:700,color:"var(--t2)",marginBottom:4}},"按话题"),
      E("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        topicOpts.map(function(t){return E("button",{key:t.id,onClick:function(){setFilterTopic(t.id)},style:{background:filterTopic===t.id?"#8e44ad":"var(--card)",color:filterTopic===t.id?"#fff":"var(--t2)",border:"none",borderRadius:12,padding:"3px 9px",fontSize:13,fontWeight:700,cursor:"pointer"}},t.name)}))),
    filtered.length===0?E("div",{style:{textAlign:"center",padding:40,color:"var(--t2)"}},"没有符合条件的题目"):
    filtered.slice(0,50).map(function(exam,i){
      var c2=typeColors[exam.y]||"#666";
      return E("div",{key:i,onClick:function(){setSelIdx(i);setStep(0)},style:{background:"var(--card)",borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",border:"1.5px solid var(--border)"}},
        E("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6}},
          E("span",{style:{fontSize:13,fontWeight:800,color:"#fff",background:c2,borderRadius:4,padding:"2px 7px"}},exam.y),
          E("span",{style:{fontSize:13,color:"var(--t2)"}},exam.d),
          E("span",{style:{fontSize:13,color:"var(--t2)",background:"var(--border)",borderRadius:4,padding:"1px 6px"}},exam.c)),
        E("div",{style:{fontSize:15,color:"var(--t1)",lineHeight:1.5}},exam.q.length>120?exam.q.slice(0,120)+"...":exam.q))
    }),
    filtered.length>50?E("div",{style:{textAlign:"center",padding:12,color:"var(--t2)",fontSize:15}},"显示前50题，请用筛选缩小范围"):null
  );
}

function App(){
  var ts=useState(null),topic=ts[0],setTopic=ts[1];
  var ms=useState(null),mode=ms[0],setMode=ms[1];
  var gs=useState(null),globalMode=gs[0],setGlobalMode=gs[1];
  
  // Global modes (top level)
  if(globalMode==="exam")return E(ExamBrowser,{onBack:function(){setGlobalMode(null)}});
  if(globalMode==="connectors")return E(ConnectorsMode,{onBack:function(){setGlobalMode(null)}});
  
  if(!topic)return E(TopicSelector,{onSelect:setTopic,onGlobal:setGlobalMode});
  if(!mode)return E(ModeSelector,{topic:topic,onSelect:setMode,onBack:function(){setTopic(null)}});
  var d=DATA[topic.id],back=function(){setMode(null)};
  if(mode==="study")return E(StudyMode,{topic:topic,data:d,onBack:back});
  if(mode==="test")return E(TestMode,{topic:topic,data:d,onBack:back});
  if(mode==="sentences")return E(SentencesMode,{topic:topic,data:d,onBack:back});
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(E(App));
</script>
</body>
</html>
